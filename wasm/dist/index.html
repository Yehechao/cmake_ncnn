<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OBB 推理测试</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f172a;color:#e2e8f0;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.main{max-width:1360px;margin:0 auto;padding:16px;display:grid;grid-template-columns:minmax(300px,360px) minmax(0,1fr);gap:16px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:14px}
.card h3{margin:0 0 12px;font-size:15px}
label{display:block;font-size:13px;color:#93c5fd;margin-bottom:6px}
input[type="text"],input[type="number"]{width:100%;padding:9px 10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;margin-bottom:10px}
input[type="file"]{width:100%;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;border:none;border-radius:8px;padding:10px 12px;color:#fff;cursor:pointer;font-weight:600;margin-bottom:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#0284c7}.btn-success{background:#059669}.btn-danger{background:#b91c1c}
.status{display:flex;justify-content:space-between;align-items:center;background:#0b1220;border:1px solid #1f2937;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:13px}
.badge{border-radius:999px;padding:2px 10px;font-size:12px}.ok{background:#14532d;color:#86efac}.no{background:#3f3f46;color:#d4d4d8}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:#0b1220;border:1px solid #1f2937;border-radius:8px;padding:10px;text-align:center}
.stat .v{font-size:20px;font-weight:700;color:#38bdf8}.stat .l{font-size:12px;color:#94a3b8}
.kv{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.kv:last-child{border-bottom:none;padding-bottom:0}
.kv span:last-child{color:#cbd5e1;font-family:Consolas,monospace}
.toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.toggle button{margin-bottom:0}
.toggle button.active{box-shadow:inset 0 0 0 1px #7dd3fc;background:#0369a1}
pre{margin:0;background:#020617;border:1px solid #1e293b;border-radius:10px;padding:12px;color:#c7d2fe;font-size:12px;line-height:1.6;overflow:auto;height:480px}
#log{height:220px;overflow:auto;background:#020617;border:1px solid #1e293b;border-radius:10px;padding:10px;font-family:Consolas,monospace;font-size:12px}
.hint{font-size:12px;color:#94a3b8;line-height:1.6}
.hidden{display:none}
@media (max-width:1100px){.stats{grid-template-columns:1fr 1fr}}
@media (max-width:980px){.main{grid-template-columns:1fr}}
@media (max-width:680px){
  .main{padding:10px;gap:10px}
  .card{padding:12px;margin-bottom:10px}
  .row{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  pre{height:320px}
  #log{height:180px}
}
</style>
</head>
<body>
<div class="main">
  <div>
    <div class="card">
      <h3>模型加载（OBB）</h3>
      <div class="status"><span>状态</span><span id="modelStatus" class="badge no">未加载</span></div>
      <div class="hint" style="margin-bottom:10px">
        自动加载目录：<span id="modelFolderInfo">models/AiBody416n</span>
      </div>
      <div class="row">
        <div>
          <label for="obbSize">输入尺寸</label>
          <input id="obbSize" type="number" value="416" min="32" step="32" />
        </div>
        <div>
          <label for="obbConf">置信度</label>
          <input id="obbConf" type="number" value="0.25" min="0" max="1" step="0.01" />
        </div>
      </div>
      <label for="obbIou">NMS IOU</label>
      <input id="obbIou" type="number" value="0.45" min="0" max="1" step="0.01" />
      <button id="btnReloadModel" class="btn btn-primary" disabled>重新加载模型</button>
    </div>

    <div class="card">
      <h3>输入与推理</h3>
      <div class="toggle">
        <button id="btnTxtAutoMode" class="btn btn-primary active" type="button">自动加载</button>
        <button id="btnTxtManualMode" class="btn btn-primary" type="button">手动加载</button>
      </div>
      <div id="txtAutoPanel">
        <div class="hint" style="margin-bottom:10px">自动扫描并加载 `data/` 目录下全部 TXT 文件。</div>
        <button id="btnLoadAutoTxt" class="btn btn-primary" type="button">自动加载全部 TXT</button>
      </div>
      <div id="txtManualPanel" class="hidden">
        <label for="txtFiles">热力图 TXT 文件</label>
        <input id="txtFiles" type="file" accept=".txt" multiple />
      </div>
      <div id="fileInfo" style="font-size:12px;color:#94a3b8;margin-bottom:10px">未选择文件</div>
      <label for="intervalMs">帧间隔(ms)</label>
      <input id="intervalMs" type="number" value="120" min="10" step="10" />
      <button id="btnRunOne" class="btn btn-success" disabled>运行当前帧</button>
      <button id="btnRunAll" class="btn btn-primary" disabled>连续运行</button>
      <button id="btnStop" class="btn btn-danger" disabled>停止</button>
      <div class="row">
        <button id="btnPrev" class="btn btn-primary" disabled>上一帧</button>
        <button id="btnNext" class="btn btn-primary" disabled>下一帧</button>
      </div>
      <input id="frameSlider" type="range" min="0" max="0" value="0" disabled style="width:100%" />
      <div id="frameDesc" style="font-size:12px;color:#94a3b8">0 / 0</div>
    </div>

    <div class="card">
      <h3>运行时环境</h3>
      <div class="kv"><span>crossOriginIsolated</span><span id="envIsolated">-</span></div>
      <div class="kv"><span>SharedArrayBuffer</span><span id="envSab">-</span></div>
      <div class="kv"><span>逻辑核心数</span><span id="envCores">-</span></div>
      <div class="kv"><span>推荐线程数</span><span id="envThreads">-</span></div>
    </div>

    <div class="card">
      <h3>日志</h3>
      <div id="log"></div>
    </div>
  </div>

  <div>
    <div class="card">
      <h3>统计</h3>
      <div class="stats" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div class="stat"><div class="v" id="statTime">-</div><div class="l">耗时(ms)</div></div>
        <div class="stat"><div class="v" id="statDet">-</div><div class="l">检测目标数量</div></div>
        <div class="stat"><div class="v" id="statAvg">-</div><div class="l">平均耗时(ms)</div></div>
        <div class="stat"><div class="v" id="statFps">-</div><div class="l">FPS</div></div>
      </div>
    </div>
    <div class="card">
      <h3>结果（DrawResults）</h3>
      <pre id="resultText">等待推理...</pre>
    </div>
  </div>
</div>

<script src="yolo_ncnn_wasm.js?v=mobile-single-20260311-1"></script>
<script>
const $ = (id) => document.getElementById(id);
let Module = null;
let frames = [];
let current = 0;
let playing = false;
let timer = null;
let paramBytes = null;
let binBytes = null;
let modelLoaded = false;
let batchRunning = false;
let batchCount = 0;
let batchTotalMs = 0;
const MODEL_DIR = "models/AiBody416n";
const MODEL_PARAM_URL = `${MODEL_DIR}/model.param`;
const MODEL_BIN_URL = `${MODEL_DIR}/model.bin`;
const DATA_DIR = "data";
const ASSET_VERSION = "mobile-single-20260311-1";
let txtLoadMode = "auto";
let initRetryCount = 0;
let initStarted = false;

function log(msg){const t=new Date().toLocaleTimeString();const el=$("log");el.innerHTML += `<div>[${t}] ${msg}</div>`;el.scrollTop=el.scrollHeight;console.log(msg);}
function setLoaded(ok){modelLoaded=!!ok;const el=$("modelStatus");el.textContent=ok?"已加载":"未加载";el.className=`badge ${ok?"ok":"no"}`;}
function canRun(){return !!Module && modelLoaded && frames.length>0;}
function refreshButtons(){const c=canRun();$("btnRunOne").disabled=!c;$("btnRunAll").disabled=!c;$("btnPrev").disabled=!c;$("btnNext").disabled=!c;$("frameSlider").disabled=!c;}
function resetBatchStats(){batchCount=0;batchTotalMs=0;$("statAvg").textContent="-";$("statFps").textContent="-";}
function updateRuntimeInfo(){
  const cores = Number(navigator.hardwareConcurrency || 0);
  const threads = Math.max(1, Math.floor((cores || 4) / 2));
  $("envIsolated").textContent = window.crossOriginIsolated ? "Yes" : "No";
  $("envSab").textContent = typeof SharedArrayBuffer !== "undefined" ? "Yes" : "No";
  $("envCores").textContent = cores > 0 ? String(cores) : "Unknown";
  $("envThreads").textContent = String(threads);
}
function flushBatchStats(){
  if(batchCount<=0 || batchTotalMs<=0){
    $("statAvg").textContent="-";
    $("statFps").textContent="-";
    log("连续运行结束：无有效统计数据");
    return;
  }
  const avg = batchTotalMs / batchCount;
  const fps = 1000 / avg;
  $("statAvg").textContent = avg.toFixed(2);
  $("statFps").textContent = fps.toFixed(2);
  log(`连续运行结束：共 ${batchCount} 帧，平均耗时 ${avg.toFixed(2)} ms，FPS ${fps.toFixed(2)}`);
}

function readText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file);});}
function readBin(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(new Uint8Array(e.target.result));r.onerror=rej;r.readAsArrayBuffer(file);});}
function writeFS(path,bytes){try{Module.FS.unlink(path);}catch(_){ } Module.FS.writeFile(path,bytes);}
async function fetchBin(url){
  const resp = await fetch(`${url}?v=${ASSET_VERSION}`, { cache: "no-store" });
  if(!resp.ok) throw new Error(`${url} -> HTTP ${resp.status}`);
  return new Uint8Array(await resp.arrayBuffer());
}
async function fetchText(url){
  const resp = await fetch(`${url}?v=${ASSET_VERSION}`, { cache: "no-store" });
  if(!resp.ok) throw new Error(`${url} -> HTTP ${resp.status}`);
  return await resp.text();
}
function sortFileNames(list){
  return list.slice().sort((a,b)=>a.localeCompare(b,"zh-CN",{numeric:true,sensitivity:"base"}));
}

function parseTxt(content){
  const compact=content.replace(/[\s\r\n\t]/g,"");
  if(!compact.startsWith("{{")||!compact.endsWith("}}")) return null;
  const rows=compact.slice(2,-2).split("},{");
  if(rows.length!==32) return null;
  const flat=new Float32Array(32*64);
  for(let r=0;r<32;r++){
    const vals=rows[r].replace(/^\{/,"").replace(/\}$/,"").split(",");
    for(let c=0;c<64;c++) flat[r*64+c]=Number(vals[c]||0);
  }
  return flat;
}

function updateFrameInfo(){
  $("fileInfo").textContent=frames.length?`已加载 ${frames.length} 个TXT文件`:"未选择文件";
  $("frameSlider").max=String(Math.max(0,frames.length-1));
  $("frameSlider").value="0";
  $("frameDesc").textContent=frames.length?`1 / ${frames.length} (${frames[0].name})`:"0 / 0";
  refreshButtons();
}

function setTxtMode(mode){
  txtLoadMode = mode;
  $("txtAutoPanel").classList.toggle("hidden", mode !== "auto");
  $("txtManualPanel").classList.toggle("hidden", mode !== "manual");
  $("btnTxtAutoMode").classList.toggle("active", mode === "auto");
  $("btnTxtManualMode").classList.toggle("active", mode === "manual");
}

window.addEventListener("error",(e)=>{
  const msg = e && e.message ? e.message : "unknown error";
  log(`JS 错误: ${msg}`);
});
window.addEventListener("unhandledrejection",(e)=>{
  const reason = e && e.reason ? (e.reason.message || String(e.reason)) : "unknown rejection";
  log(`Promise 错误: ${reason}`);
});

function pad(v,w){return String(v).padEnd(w," ");}
function formatResult(result){
  const lines=[];
  const det=Array.isArray(result.detections)?result.detections:[];
  lines.push(`检测到 ${det.length} 个OBB目标:`);
  lines.push("==================================================================================");
  lines.push("ID    置信度    中心点X   中心点Y   长度      宽度      角度(弧度)");
  lines.push("==================================================================================");
  for(const d of det){
    const row =
      pad(Number(d.id ?? -1),6)+
      pad(Number(d.confidence||0).toFixed(3),10)+
      pad(Number(d.cx||0).toFixed(2),10)+
      pad(Number(d.cy||0).toFixed(2),10)+
      pad(Number(d.l||0).toFixed(2),10)+
      pad(Number(d.s||0).toFixed(2),10)+
      pad(Number(d.angle||0).toFixed(4),12);
    lines.push(row);
  }
  lines.push("==================================================================================");
  return lines.join("\n");
}

async function loadModel(){
  if(!Module) return;
  if(!paramBytes || !binBytes){ log("模型文件未就绪"); return; }
  writeFS("/model_obb.param",paramBytes);
  writeFS("/model_obb.bin",binBytes);
  const ok=Module.loadObbModel("/model_obb.param","/model_obb.bin",Number($("obbSize").value||416),Number($("obbConf").value||0.25),Number($("obbIou").value||0.45));
  setLoaded(!!ok);
  log(ok?"OBB 模型加载成功":"OBB 模型加载失败");
  refreshButtons();
}

async function loadModelFromDist(){
  try{
    $("modelFolderInfo").textContent = MODEL_DIR;
    log(`开始加载模型: ${MODEL_DIR}`);
    paramBytes = await fetchBin(MODEL_PARAM_URL);
    binBytes = await fetchBin(MODEL_BIN_URL);
    await loadModel();
  }catch(e){
    paramBytes = null;
    binBytes = null;
    setLoaded(false);
    refreshButtons();
    log(`自动加载模型失败: ${e.message || e}`);
  }
}

async function loadFramesFromFiles(files){
  stopPlay();
  files.sort((a,b)=>a.name.localeCompare(b.name,"zh-CN",{numeric:true,sensitivity:"base"}));
  frames=[];
  for(const f of files){
    const txt=await readText(f);
    const flat=parseTxt(txt);
    if(flat) frames.push({name:f.name,data:flat});
    else log(`跳过无效TXT: ${f.name}`);
  }
  current=0;
  updateFrameInfo();
}

async function listAutoTxtFiles(){
  const html = await fetchText(`${DATA_DIR}/`);
  const names = new Set();
  const re = /href="([^"]+\.txt)"/gi;
  let m = null;
  while((m = re.exec(html)) !== null){
    const href = decodeURIComponent(m[1]);
    const name = href.split("/").pop();
    if(name && !name.startsWith(".")) names.add(name);
  }
  return sortFileNames(Array.from(names));
}

async function loadFramesAuto(){
  stopPlay();
  frames=[];
  let names = [];
  try{
    names = await listAutoTxtFiles();
  }catch(e){
    log(`扫描 data 目录失败: ${e.message || e}`);
    updateFrameInfo();
    return;
  }

  if(!names.length){
    log("data 目录下未找到 TXT 文件");
    updateFrameInfo();
    return;
  }

  for(const name of names){
    const url = `${DATA_DIR}/${name}`;
    try{
      const txt = await fetchText(url);
      const flat = parseTxt(txt);
      if(flat) frames.push({name,data:flat});
      else log(`跳过无效TXT: ${url}`);
    }catch(e){
      log(`自动加载失败: ${url} (${e.message || e})`);
    }
  }

  current=0;
  updateFrameInfo();
}

function runFrame(i){
  if(!canRun()) return null;
  if(i<0 || i>=frames.length) return null;
  const t0=performance.now();
  const jsonStr=Module.runObb(frames[i].data,32,64);
  const msNum=performance.now()-t0;
  const ms=msNum.toFixed(1);
  let result={};
  try{result=JSON.parse(jsonStr);}catch(_){result={success:false,error:"invalid json"};}
  if(!result.success){$("resultText").textContent=jsonStr;log("推理失败: "+(result.error||"unknown"));return {ok:false,ms:msNum};}
  const detCount=Array.isArray(result.detections)?result.detections.length:0;
  $("statTime").textContent=ms;
  $("statDet").textContent=String(detCount);
  $("resultText").textContent=formatResult(result);
  current=i;
  $("frameSlider").value=String(i);
  $("frameDesc").textContent=`${i+1} / ${frames.length} (${frames[i].name})`;
  return {ok:true,ms:msNum};
}

function stopPlay(){
  const wasPlaying = playing;
  playing=false;
  if(timer){clearTimeout(timer);timer=null;}
  $("btnStop").disabled=true;
  if(wasPlaying && batchRunning){
    flushBatchStats();
    batchRunning=false;
  }
}
function playLoop(){
  if(!playing) return;
  if(current>=frames.length){stopPlay(); return;}
  const ret = runFrame(current);
  if(ret && ret.ok){batchCount++;batchTotalMs+=ret.ms;}
  current++;
  timer=setTimeout(playLoop,Number($("intervalMs").value||120));
}

$("txtFiles").addEventListener("change",async function(){
  const files=Array.from(this.files||[]);
  await loadFramesFromFiles(files);
});

$("btnTxtAutoMode").addEventListener("click",()=>setTxtMode("auto"));
$("btnTxtManualMode").addEventListener("click",()=>setTxtMode("manual"));
$("btnLoadAutoTxt").addEventListener("click",()=>loadFramesAuto());
$("btnRunOne").addEventListener("click",()=>runFrame(current));
$("btnReloadModel").addEventListener("click",()=>loadModelFromDist());
$("btnRunAll").addEventListener("click",()=>{
  if(playing) return;
  resetBatchStats();
  batchRunning=true;
  playing=true;
  $("btnStop").disabled=false;
  current=Number($("frameSlider").value||0);
  playLoop();
});
$("btnStop").addEventListener("click",()=>{stopPlay(); log("连续运行已停止");});
$("btnPrev").addEventListener("click",()=>{if(!frames.length) return; current=Math.max(0,current-1); runFrame(current);});
$("btnNext").addEventListener("click",()=>{if(!frames.length) return; current=Math.min(frames.length-1,current+1); runFrame(current);});
$("frameSlider").addEventListener("input",function(){current=Number(this.value||0); runFrame(current);});

function init(){
  if(initStarted) return;
  initStarted = true;
  log("页面脚本已启动");
  updateRuntimeInfo();
  setTxtMode("auto");
  $("btnReloadModel").disabled = true;

  const waitForModule = ()=>{
    if(typeof YoloNcnnModule==="undefined"){
      initRetryCount++;
      if(initRetryCount === 1 || initRetryCount % 10 === 0){
        log(`等待 YoloNcnnModule... (${initRetryCount})`);
      }
      if(initRetryCount >= 25){
        log("未检测到 YoloNcnnModule，前端初始化已停止");
        return;
      }
      setTimeout(waitForModule,200);
      return;
    }

    log("检测到 YoloNcnnModule，开始初始化 WASM");
    YoloNcnnModule({
      locateFile:(path)=>`${path}?v=${ASSET_VERSION}`,
      print:(t)=>log(t),
      printErr:(t)=>log("ERR: "+t)
    }).then(async (mod)=>{
    Module=mod;
    log("WASM 初始化成功");
    setLoaded(false);
    $("btnReloadModel").disabled = false;
    refreshButtons();
    log("开始自动加载模型");
    await loadModelFromDist();
    }).catch((e)=>log("WASM 初始化失败: "+(e && e.message ? e.message : e)));
  };

  waitForModule();
}
init();
</script>
</body>
</html>
